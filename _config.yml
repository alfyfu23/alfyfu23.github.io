lang: zh-CN
timezone: Asia/Shanghai

title: Alfyfu
tagline: 清华大学计算机本科生
description: >-
  清华大学计算机科学与技术本科在读。个人主页 — 项目展示、技术博客。
url: "https://alfyfu23.github.io"
avatar: /assets/img/avatar.jpg
github:
  username: alfyfu23

theme: jekyll-theme-chirpy

comments:
  active: utterances
  utterances:
    repo: alfyfu23/alfyfu23.github.io
    issue-term: pathname
    theme: github-light

search:
  enabled: true
  placeholder: 搜索文章...

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /tabs/:title/

pagination:
  enabled: true

page_view_style: badge

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - rollup.config.js
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
